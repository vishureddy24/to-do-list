<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Task Manager | Seamless Productivity</title>
    <meta name="description" content="A premium, glassmorphic to-do list application to manage your daily tasks with ease and style.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="app-container">
        <header>
            <h1>Elite Tasks</h1>
            <p id="current-date"></p>
        </header>

        <section class="input-section">
            <div class="input-wrapper">
                <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off">
                <button id="add-task-btn" aria-label="Add Task">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
        </section>

        <section class="list-section">
            <ul id="task-list">
                <!-- Tasks will be injected here -->
            </ul>
        </section>

        <footer>
            <div class="stats">
                <span id="items-left">0 items left</span>
            </div>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
